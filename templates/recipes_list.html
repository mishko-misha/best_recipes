<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
</head>
<body>
    <div class="container">
        <h1>Recipes List</h1>

        <form action="/recipes/" method="get">
    <input type="text" name="name" placeholder="Search recipe">
    <button type="submit">Search</button>
</form><br>

        {% if recipes %}
            {% for recipe in recipes %}
                <div class="recipe-card">
                    {{ recipe.title}} (cooking time:{{ recipe.cooking_time }} minutes, author: {{ recipe.author.username }}) - <a href="{% url 'recipe_detail' recipe.id%}">Details</a>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty-message">
                No recipes available yet.
            </div>
        {% endif %}
    </div><br>
    <form action="/recipes/create/" method="post">
    {% csrf_token %}
    <button type="submit">Create recipe</button>
    </form>
</body>
</html>
